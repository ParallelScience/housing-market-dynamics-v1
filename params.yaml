hardware_constraints: "- Linux x86_64 Docker container\n- 4 CPUs (AMD Ryzen Threadripper\
  \ PRO 9995WX), 8 GB RAM\n- No GPU \u2014 do not use CUDA or GPU-dependent libraries\n\
  - Multiprocessing: limit to 4 workers max\n- NumPy/SciPy use OpenBLAS \u2014 set\
  \ OMP_NUM_THREADS=2 to avoid thread oversubscription with multiprocessing\n- Memory\
  \ is limited \u2014 avoid loading large datasets entirely into RAM; use chunked/streaming\
  \ approaches for data > 2 GB"
